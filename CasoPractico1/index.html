<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ValidacionesJS</title>
    <link rel="stylesheet" type="text/css" href="estilos.css">
    <script defer src="script.js"></script>
</head>

<body class="imagenDia">
    <div class="toggleContainer">

        <input type="checkbox" id="switch" class="toggle">

        <label for="switch"id=diaNoche class="switch"></label>

    </div>
    <form action="" class="formulario">
        <h2>Formulario</h2>
        <label>
            <input type="text" name="nombre" placeholder="Introduzca su nombre" id="nombre" class="input">
            <b class="subtit">Nombre</b>
        </label>
        <label class="oculto">
            <input type="text" name="Apellidos" placeholder="Introduzca sus apellidos" id="apellidos" class="input">
            <b class="subtit">Apellidos</b>
        </label>
        <label class="oculto">
            <input type="tel" name="numero" placeholder="Introduzca su numero" id="num" class="input">
            <b class="subtit">Telefono</b>
        </label>
        <label class="oculto">
            <input type="email" name="email" placeholder="email coorporativo" id="email" class="input">
            <b class="subtit">Email coorporativo @g.educaand.es</b>
        </label>
        <label class="oculto">
            <input type="date" name="fecha" placeholder="" id="fecha" class="input fecha">
            <b class="subtit">Fecha de nacimiento</b>
        </label>
        <label class="oculto">
            <input type="password" name="password" placeholder="Introduzca una contraseña" id="pass" class="input ">
            <b class="subtit">Contraseña  &nbsp; &nbsp; &nbsp;&nbsp;&nbsp; &nbsp;+8  caracteres </b>
        </label>
        <label class="oculto">
            <input type="password" name="pasword" placeholder="Repita la contraseña" id="pass2" class="input">
            <b class="subtit">Repetir contraseña</b>
        </label>
        <label class="oculto">
            <input type="text" name="dni" placeholder="Introduzca su DNI" id="dni" class="input">
            <b class="subtit">DNI</b>
        </label>
        <label class="oculto">
            <div class="subtit publi">Acepto los terminos y servicios previamente descritos</div>
            <input type="checkbox" name="publi" id="publi" class="input check">
        </label>
        <label class="oculto">
            <input type="button" value="Finalizar" id="boton" onclick="alert('Enhorabuena por completar el formulario')"
                class="input boton">
        </label>
    </form>
</body>

</html>
